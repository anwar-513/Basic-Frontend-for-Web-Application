<h1 style="color: blue;">
    Boolean Attributes
</h1>

<p class="defining-text" style="font-size: large;">
    A type of attributes that has only two possible values/states. if it is present in the code,
    it is true and if there is no boolean attributes in code it is false. The browsers don't care about the value
    in it, if it exists, it is considered true.
</p>
