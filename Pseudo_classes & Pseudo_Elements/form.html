<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseWright - Enrollment Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>


    <h1 class="form-heading">Enrollment Form</h1>
    <h2 class="form-sub-heading">Please fill out the form below to enroll in your desired course.</h2>
    <h3 class="words-of-encourage">We're excited to have you join our community of learners!</h3>
    <form class="form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Email" required>

        <label for="phone">Phone:</label>
        <input type="number" id="phone" name="phone" placeholder="Phone number" required>

        <label for="course">Course:</label>
        <select id="course" name="course" required>
            <option value="">Select a course</option>
            <option value="web-development">Web Development</option>
            <option value="data-science">Data Science</option>
            <option value="digital-marketing">Digital Marketing</option>
        </select>

        <button type="submit">Enroll Now</button>
    </form>
</body>

</html>
