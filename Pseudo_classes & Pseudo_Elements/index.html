<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseWright - Enrollment Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="body">
    <div class="navigation-bar ">
        <a href="index.html" class="nav-ba"><span>Go Home</span></a>
        <a href="form.html" class="nav-ba"><span>Enroll Now</span></a>
    </div>
    <div class="heading-area">
        <h1 class="main-heading">Enrollment Form</h1>
        <h2 class="sub-heading">We're excited to have you join our community of learners!</h2>
        <h3 class="words-of-encourage">Please fill out the form below to enroll.</h3>
    </div>



    <form class="form" action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Email" required>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" placeholder="Phone number" required>

        <section class="filter">
            <label for="gender"> Gender: </label>
            <input type="radio" id="male" name="gender">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender">
            <label for="female">Female</label>
        </section>

        <label for="age">Age: </label>
        <input type="number" id="age" placeholder="age" required>


        <a href="catalog.html" class="submit enroll">Enroll</a>

    </form>
</body>

</html>
