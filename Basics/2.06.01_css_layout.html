<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="veiwpoint" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="2.06.02_css_layout.css">
    <title> Layout</title>
</head>

<body>
    <div class="heading-area">
        <h1 class="heading">
            CSS Layout
        </h1>
    </div>

    <div class="description">
        <p class="text">
            Just like a word document layout webpages also use layout like boxes after one another, text in a
            stylesheet, a full organized bunch of boxes and so on.
        </p>
    </div>

    <section class="boxes inline">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
    </section>

    <section class="boxes in-colom">
        <div class="box-1">Box 1</div>
        <div class="box-2">Box 2</div>
        <div class="box-3">Box 3</div>
        <div class="box-4">Box 4</div>
    </section>

    <section class="boxes floated">
        <div class="box1">Box 1</div>
        <div class="box2">Box 2</div>
        <div class="box3">Box 3</div>
        <div class="box4">Box 4</div>
    </section>
</body>

</html>
